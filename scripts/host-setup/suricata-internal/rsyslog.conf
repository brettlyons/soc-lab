# Tier 2 Suricata EVE → Wazuh forwarder
# Tails /var/log/suricata/eve.json (mapped from host's /var/log/suricata/internal/)
# and forwards each line to Wazuh syslog receiver via TCP on port 514.
#
# Deployed as: /etc/rsyslog-suricata/rsyslog.conf
# Run via Quadlet: /etc/containers/systemd/rsyslog-suricata.container
# Image: docker.io/rsyslog/syslog_appliance_alpine

global(workDirectory="/work")

module(load="imfile" PollingInterval="5")

input(type="imfile"
      File="/var/log/suricata/eve.json"
      Tag="suricata-eve-internal"
      Severity="info"
      Facility="local4"
      PersistStateInterval="10"
      ReadMode="0"
      FreshStartTail="on"
      StateFile="suricata-eve-internal")

if $syslogfacility-text == 'local4' then {
    action(type="omfwd"
           Target="192.168.10.10"
           Port="514"
           Protocol="tcp"
           Template="RSYSLOG_SyslogProtocol23Format")
    stop
}
