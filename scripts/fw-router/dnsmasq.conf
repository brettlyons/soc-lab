# dnsmasq config for fw-router
# Handles DNS + DHCP for lab-net (192.168.10.0/24)
# eth1 = lab-net

# Listen on lab-net (for lab VMs) and WAN (for host/hypervisor management queries)
interface=eth1
interface=eth0
bind-interfaces
listen-address=192.168.10.1
listen-address=192.168.122.10

# DNS hardening
domain-needed       # don't forward bare hostnames upstream
bogus-priv          # don't forward reverse lookups for RFC1918 upstream
no-resolv           # don't use /etc/resolv.conf for upstream

# Upstream forwarders
server=1.1.1.1
server=8.8.8.8

# Local domain
domain=lab.local
local=/lab.local/

# DHCP range (dynamic pool — static IPs stay in .1-.99)
dhcp-range=192.168.10.100,192.168.10.200,12h

# DHCP options
dhcp-option=3,192.168.10.1    # option 3  = default gateway
dhcp-option=6,192.168.10.1    # option 6  = DNS server
dhcp-option=15,lab.local      # option 15 = domain name
dhcp-option=66,192.168.10.1   # option 66 = TFTP server (PXE-ready)

# Static DHCP reservations (MAC -> hostname -> IP)
dhcp-host=52:54:00:99:10:49,wazuh,192.168.10.10
dhcp-host=52:54:00:18:01:10,splunk,192.168.10.40
dhcp-host=52:54:00:e2:4c:3f,win-forensic,192.168.10.50
dhcp-host=52:54:00:32:ec:6f,win-user01,192.168.10.30
dhcp-host=52:54:00:bd:25:da,win-user02,192.168.10.31

# Authoritative mode — respond with NACK to unknown leases (avoids stale lease confusion)
dhcp-authoritative

# Local DNS A records (for statically-configured hosts + service names)
address=/fw-router.lab.local/192.168.10.1
address=/wazuh.lab.local/192.168.10.10
address=/splunk.lab.local/192.168.10.40
address=/win-forensic.lab.local/192.168.10.50
address=/win-user01.lab.local/192.168.10.30
address=/win-user02.lab.local/192.168.10.31
address=/dc01.lab.local/192.168.10.20

# Logging
log-dhcp
log-queries=extra
log-facility=/var/log/dnsmasq.log
